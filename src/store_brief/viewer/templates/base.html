<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Parse Viewer{% endblock %}</title>
  <link rel="stylesheet" href="/static/viewer.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/" class="brand">Parse Viewer</a>
        <a href="/kg" class="brand-sub">Knowledge Graph</a>
        <a href="/qa" class="brand-sub">Q&A 테스트</a>
      </div>
      {% block sidebar %}{% endblock %}
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
